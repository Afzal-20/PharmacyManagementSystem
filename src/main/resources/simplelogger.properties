# SLF4J SimpleLogger configuration for PharmDesk
# Logs are written to C:\ProgramData\PharmDesk\pharmdesk.log

org.slf4j.simpleLogger.logFile=C:/ProgramData/PharmDesk/pharmdesk.log
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true

# Keep DAO logs at warn to avoid flooding the log file with SQL noise
org.slf4j.simpleLogger.log.com.my.pharmacy.dao=warn
org.slf4j.simpleLogger.log.com.my.pharmacy.config=info
